<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Atom Bonding Studio</title>
    <script data-file-redirect>
      if (location.protocol === "file:" && !location.pathname.replaceAll("\\", "/").includes("/dist/")) {
        location.replace("./dist/index.html");
      }
    </script>
    <script data-load-guard>
      function showLoadError() {
        var root = document.getElementById("root");
        if (!root || root.dataset.ready === "true") return;
        root.innerHTML = '<div style="min-height:100vh;display:grid;place-items:center;background:#111316;color:#edf8ff;font-family:system-ui,sans-serif;padding:24px;text-align:center;"><div><h1 style="font-size:24px;margin:0 0 8px;">Atom Bonding Studio could not load</h1><p style="max-width:560px;margin:0;color:#a7b2ad;">Open the built file at dist/index.html and make sure the browser can access the app files.</p></div></div>';
      }
      window.addEventListener("error", showLoadError);
      window.addEventListener("unhandledrejection", showLoadError);
    </script>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div id="root">
      <div style="min-height:100vh;display:grid;place-items:center;background:#0b1020;color:#e2e8f0;font-family:system-ui,sans-serif;">
        Opening Atom Bonding Studio...
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
